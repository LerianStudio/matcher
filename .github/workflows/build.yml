name: "Build"

on:
  push:
    tags:
      - '**'

jobs:
  build:
    uses: LerianStudio/github-actions-shared-workflows/.github/workflows/build.yml@3197048995e33cfe9880a4c2c76c20f4cf9bd3ef # v1.26.3
    with:
      runner_type: "blacksmith-4vcpu-ubuntu-2404"
      enable_dockerhub: true
      enable_ghcr: true
      dockerhub_org: lerianstudio
      enable_gitops_artifacts: true
      shared_paths: |
        go.mod
        go.sum
        pkg/
        Makefile
    secrets: inherit

  update_gitops:
    needs: [build]
    if: >-
      !cancelled() &&
      needs.build.result == 'success' &&
      (contains(github.ref, '-beta') || contains(github.ref, '-rc')) &&
      needs.build.outputs.has_builds == 'true'
    uses: LerianStudio/github-actions-shared-workflows/.github/workflows/gitops-update.yml@3197048995e33cfe9880a4c2c76c20f4cf9bd3ef # v1.26.3
    with:
      runner_type: "firmino-lxc-runners"
      artifact_pattern: "gitops-tags-matcher"
      deploy_in_firmino: true
      deploy_in_clotilde: true
      yaml_key_mappings: '{"matcher.tag": ".matcher.image.tag"}'
    secrets: inherit
