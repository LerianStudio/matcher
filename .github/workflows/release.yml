name: Release

on:
  push:
    branches:
      - develop
      - release-candidate
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/**'
      - 'LICENSE'
      - 'CODEOWNERS'
      - '.gitignore'
      - 'images/**'
      - '*.txt'

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Create Release
    uses: LerianStudio/github-actions-shared-workflows/.github/workflows/release.yml@268d75a43e5339819131d1309d0f39862a8cb7af # v1.27.5
    with:
      runner_type: "blacksmith-4vcpu-ubuntu-2404"
    secrets: inherit
