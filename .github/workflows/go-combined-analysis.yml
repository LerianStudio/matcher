name: "Go Combined Analysis"

on:
  pull_request:
    branches:
      - develop
      - release-candidate
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE/**'
      - '.github/*.md'
      - '.github/CODEOWNERS'
      - 'LICENSE'
      - 'CODEOWNERS'
      - '.gitignore'
      - 'images/**'
      - '*.txt'

jobs:
  go-analysis:
    name: Go Analysis
    uses: LerianStudio/github-actions-shared-workflows/.github/workflows/go-pr-analysis.yml@v1.23.1
    with:
      runner_type: "blacksmith-4vcpu-ubuntu-2404"
      app_name_prefix: "matcher"
      go_version: "1.26.1"
      golangci_lint_version: "v2.10.1"
      golangci_lint_args: "--timeout=5m"
      coverage_threshold: 70
      fail_on_coverage_threshold: true
      enable_lint: true
      enable_security: true
      enable_tests: true
      enable_coverage: true
      enable_build: true
    secrets: inherit

  migration-integrity:
    name: Migration Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check migration file integrity
        run: |
          chmod +x scripts/check-migrations.sh
          ./scripts/check-migrations.sh
