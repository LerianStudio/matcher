name: PR Validation

on:
  pull_request:
    branches: [develop, release-candidate, main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  validate:
    uses: LerianStudio/github-actions-shared-workflows/.github/workflows/pr-validation.yml@v1.23.1
    with:
      runner_type: "blacksmith-4vcpu-ubuntu-2404"
      pr_title_types: |
        feat
        fix
        docs
        style
        refactor
        perf
        test
        chore
        ci
        build
        revert
      pr_title_scopes: |
        api
        cmd
        internal
        handlers
        middleware
        router
        routes
        schemas
        bounded-contexts
        constants
        infrastructure
        platform
        service
        migrations
        scripts
        configs
        deps
        configuration
        ingestion
        matching
        exception
        governance
        reporting
        outbox
        shared
      require_scope: false
      min_description_length: 50
      check_changelog: true
      enable_auto_labeler: true
      labeler_config_path: '.github/labeler.yml'
    secrets: inherit
