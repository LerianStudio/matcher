info:
  contact:
    email: support@lerian.studio
    name: Lerian Studio Support
    url: https://discord.gg/DnhqKwkGv3
  description: |-
    Reconciliation engine for the Lerian Studio ecosystem.
    Provides automated transaction matching between Midaz ledger and external systems.
  license:
    name: Lerian Studio General License
    url: https://github.com/LerianStudio/matcher/blob/main/LICENSE.md
  termsOfService: http://swagger.io/terms/
  title: Matcher Reconciliation API
  version: v1.0.0
paths:
  /health:
    get:
      description: |-
        Returns a simple health check response to indicate the service is alive.
        Used by Kubernetes liveness probes to detect if the service needs to be restarted.
      operationId: getHealth
      produces:
      - text/plain
      responses:
        "200":
          description: healthy
          schema:
            type: string
      summary: Liveness check
      tags:
      - Health
  /ready:
    get:
      description: |-
        Checks if the service is ready to accept traffic by verifying all required dependencies.
        Used by Kubernetes readiness probes to control traffic routing.
        Returns 200 OK when all required dependencies are healthy, 503 Service Unavailable otherwise.
        Dependency check details are only included in development/test environments.
      operationId: getReady
      produces:
      - application/json
      responses:
        "200":
          description: Service is ready to accept traffic
          schema:
            $ref: '#/definitions/internal_bootstrap.ReadinessResponse'
        "503":
          description: Service is not ready (degraded state)
          schema:
            $ref: '#/definitions/internal_bootstrap.ReadinessResponse'
      summary: Readiness check
      tags:
      - Health
  /v1/config/contexts:
    get:
      description: Returns a cursor-paginated list of reconciliation contexts, optionally
        filtered by type and status.
      operationId: listContexts
      parameters:
      - description: Request ID for tracing
        in: header
        name: X-Request-Id
        type: string
      - default: 20
        description: Maximum number of records to return
        in: query
        maximum: 200
        minimum: 1
        name: limit
        type: integer
      - description: Cursor for pagination (opaque)
        in: query
        name: cursor
        type: string
      - description: Filter by context type
        enum:
        - "1:1"
        - 1:N
        - N:M
        in: query
        name: type
        type: string
      - description: Filter by context status
        enum:
        - DRAFT
        - ACTIVE
        - PAUSED
        - ARCHIVED
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of contexts with cursor pagination
          schema:
            $ref: '#/definitions/internal_configuration_adapters_http.ListContextsResponse'
        "400":
          description: Invalid query parameters
          schema:
            $ref: '#/definitions/github_com_LerianStudio_matcher_internal_shared_adapters_http.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_LerianStudio_matcher_internal_shared_adapters_http.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_LerianStudio_matcher_internal_shared_adapters_http.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_LerianStudio_matcher_internal_shared_adapters_http.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List reconciliation contexts
      tags:
      - Configuration Contexts
    post:
      consumes:
      - application/json
      description: Creates a new reconciliation context used to scope matching rules.
      operationId: createContext
      parameters:
      - description: Request ID for tracing
        in: header
        name: X-Request-Id
        type: string
      - description: Context creation payload
        in: body
        name: context
        required: true
        schema:
          $ref: '#/definitions/github_com_LerianStudio_matcher_internal_configuration_adapters_http_dto.CreateContextRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Successfully created context
          schema:
            $ref: '#/definitions/github_com_LerianStudio_matcher_internal_configuration_adapters_http_dto.ReconciliationContextResponse'
        "400":
          description: Invalid request payload
          schema:
            $ref: '#/definitions/github_com_LerianStudio_matcher_internal_shared_adapters_http.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_LerianStudio_matcher_internal_shared_adapters_http.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_LerianStudio_matcher_internal_shared_adapters_http.ErrorResponse'
        "409":
          description: 'Conflict: duplicate resource or idempotency key in progress'
          schema:
            $ref: '#/definitions/github_com_LerianStudio_matcher_internal_shared_adapters_http.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_LerianStudio_matcher_internal_shared_adapters_http.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a reconciliation context
      tags:
      - Configuration Contexts
  /v1/config/contexts/{contextId}:
    delete:
      description: Removes a reconciliation context by ID.
      operationId: deleteContext
      parameters:
      - description: Request ID for tracing
        in: header
        name: X-Request-Id
        type: string
      - description: Context ID
        format: uuid
        in: path
        name: contextId
        required: true
        type: string
      responses:
        "204":
          description: Context successfully deleted
        "400":
          description: Invalid context ID format
          schema:
            $ref: '#/definitions/github_com_LerianStudio_matcher_internal_shared_adapters_http.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_LerianStudio_matcher_internal_shared_adapters_http.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_LerianStudio_matcher_internal_shared_adapters_http.ErrorResponse'
        "404":
          description: Context not found
          schema:
            $ref: '#/definitions/github_com_LerianStudio_matcher_internal_shared_adapters_http.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_LerianStudio_matcher_internal_shared_adapters_http.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a reconciliation context
      tags:
      - Configuration Contexts
    get:
      description: Returns a reconciliation context by ID.
      operationId: getContext
      parameters:
      - description: Request ID for tracing
        in: header
        name: X-Request-Id
        type: string
      - description: Context ID
        format: uuid
        in: path
        name: contextId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Successfully retrieved context
          schema:
            $ref: '#/definitions/github_com_LerianStudio_matcher_internal_configuration_adapters_http_dto.ReconciliationContextResponse'
        "400":
          description: Invalid context ID format
          schema:
            $ref: '#/definitions/github_com_LerianStudio_matcher_internal_shared_adapters_http.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_LerianStudio_matcher_internal_shared_adapters_http.ErrorResponse'
        "403":
